# Classifier taxonomy for the course-content categorizer.
#
# Categories are checked in the ORDER listed below (first match wins), so more
# specific / exam-relevant buckets come first. Each entry is a list of
# case-insensitive regex fragments matched against an item's title (and, at
# lower confidence, its section name). Tuned for ETH's bilingual (DE + EN)
# naming. Add fragments per course as needed — this file is config, not code.

practice_exam:
  - probeklausur
  - musterklausur
  - pr(u|ü)fung
  - alt(e|klausur)
  - past[\s_-]*exam
  - old[\s_-]*exam
  - mock[\s_-]*exam
  - practice[\s_-]*exam
  - sample[\s_-]*exam
  - exam
  - klausur
  - repetition

solution:
  - l(ö|oe)sung
  - musterl(ö|oe)sung
  - solution
  - solutions
  - answer[\s_-]*key
  - sol\b

problem_set:
  - (ü|ue)bung
  - serie
  - blatt
  - exercise
  - problem[\s_-]*set
  - aufgabe
  - assignment
  - homework
  - tutorial
  - problemset
  - sheet

lecture:
  - vorlesung
  - lecture
  - slide
  - folien
  - skript
  - script
  - handout
  - kapitel
  - chapter
  - notes?
  - zusammenfassung
  - summary
